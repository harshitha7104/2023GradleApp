/*
 * This build file was generated by the Gradle 'init' task.
 *
 * This generated file contains a sample Java project to get you started.
 */

// Modern way to apply plugins
plugins {
    id 'java'
    id 'application'
}

// In this section you declare where to find the dependencies of your project
repositories {
    // Switching to mavenCentral as jcenter is deprecated/unreliable
    mavenCentral()
}

dependencies {
    // Modern 'implementation' keyword replaces 'compile'
    implementation 'commons-io:commons-io:2.11.0'
    
    // Updated Guava version for better compatibility
    implementation 'com.google.guava:guava:31.1-jre'

    // Modern 'testImplementation' keyword replaces 'testCompile'
    testImplementation 'junit:junit:4.13.2'
}

// Define the main class for the application
mainClassName = 'App'

// Fixed task syntax and string quotes to handle the apostrophe in "I'm"
task display {
    doLast {
        println "hello I'm Harshitha"
    }
}
